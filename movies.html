    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827; /* Dark background */
            color: #f3f4f6; /* Light text */
        }
        .movie-card {
            background-color: #1f2937; /* Darker card background */
            border: 1px solid #374151; /* Card border */
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .btn-primary, .btn-pagination {
            background-color: #3b82f6; /* Blue */
            color: white;
            transition: background-color 0.2s ease;
        }
        .btn-primary:hover, .btn-pagination:hover:not(:disabled) {
            background-color: #2563eb;
        }
        .btn-primary:disabled, .btn-pagination:disabled {
            background-color: #4b5563; /* Darker gray for disabled pagination buttons */
            color: #9ca3af;
            cursor: not-allowed;
        }
        .btn-secondary {
            background-color: #6b7280; /* Gray */
            color: white;
            transition: background-color 0.2s ease;
        }
        .btn-secondary:hover {
            background-color: #4b5563;
        }
        .btn-primary:focus-visible, .btn-secondary:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px #3b82f6;
        }
        input[type="number"], select {
            background-color: #374151;
            border-color: #4b5563;
            color: #f3f4f6;
        }
        input[type="number"]:focus, select:focus {
            outline: none; /* Remove default outline */
            box-shadow: 0 0 0 2px #3b82f6; /* Custom focus ring */
            border-color: #3b82f6;
        }
        /* Custom scrollbar for webkit browsers */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
        /* Skeleton card loading */
        .skeleton-card {
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 0.5rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .skeleton-block {
            background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s ease-in-out infinite;
            border-radius: 4px;
        }
        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        #pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .page-info {
            margin: 0 1rem;
            color: #d1d5db; /* Lighter gray for page info */
        }
        .streaming-provider-logo {
            width: 24px; /* Adjust size as needed */
            height: 24px; /* Adjust size as needed */
            margin-right: 6px;
            border-radius: 4px;
            vertical-align: middle;
        }
        .streaming-info a {
            color: #60a5fa; /* Light blue for links */
            text-decoration: underline;
        }
        .streaming-info a:hover {
            color: #93c5fd;
        }
        /* Time slot segmented control */
        .time-slot-btn.active {
            background-color: #3b82f6;
            color: white;
        }
        .time-slot-btn.active:hover {
            background-color: #2563eb;
        }
        /* Custom range slider thumb */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            border: 2px solid #1e3a5f;
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            border: 2px solid #1e3a5f;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]:focus::-webkit-slider-thumb {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);
        }
        input[type="range"]:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px #3b82f6;
            border-radius: 4px;
        }
        /* Slider active state (when user has interacted) */
        input[type="range"].slider-active {
            accent-color: #3b82f6;
        }
        input[type="range"].slider-inactive {
            opacity: 0.5;
        }

        /* Focus-visible ring for time slot buttons */
        .time-slot-btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px #3b82f6 inset;
            z-index: 1;
            position: relative;
        }

        /* Streaming provider chips */
        .provider-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            min-height: 44px;
            min-width: 44px;
            border-radius: 9999px;
            border: 2px solid #374151;
            background: transparent;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, filter 0.2s;
            white-space: nowrap;
            font-size: 0.8125rem;
            color: #d1d5db;
            user-select: none;
        }
        .provider-chip:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px #3b82f6;
        }
        .provider-chip img {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            filter: grayscale(1) opacity(0.6);
            transition: filter 0.2s;
        }
        .provider-chip:hover {
            border-color: #6b7280;
        }
        .provider-chip.selected {
            border-color: #3b82f6;
            transform: scale(1.05);
        }
        .provider-chip.selected img {
            filter: none;
        }

        /* Skeleton loading pills */
        .skeleton-pill {
            display: inline-block;
            width: 110px;
            height: 36px;
            border-radius: 9999px;
            background: linear-gradient(90deg, #374151 25%, #4b5563 50%, #374151 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        @keyframes skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #22c55e;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Streaming chips scroll container (mobile/tablet) */
        .streaming-chips-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        @media (max-width: 1023px) {
            .streaming-chips-scroll {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                padding-bottom: 4px;
            }
            .streaming-chips-scroll::-webkit-scrollbar {
                display: none;
            }
            .streaming-chips-wrapper {
                position: relative;
            }
            .streaming-chips-wrapper::after {
                content: '';
                position: absolute;
                top: 0;
                right: 0;
                width: 48px;
                height: 100%;
                background: linear-gradient(to right, transparent, #1f2937);
                pointer-events: none;
                border-radius: 0 8px 8px 0;
            }
        }

        /* Responsive: mobile/tablet time slot buttons stack vertically */
        @media (max-width: 1023px) {
            #time-slot-group {
                flex-direction: column;
                width: 100%;
            }
            #time-slot-group .time-slot-btn {

            #time-slot-group .time-slot-btn:last-child {

        /* Compact filter bar on mobile */
        @media (max-width: 639px) {
            #filter-controls > div {
                padding: 1rem;
            }
        }
    </style>
</head>

        <section id="movie-results-section">
            <h2 class="text-2xl font-semibold mb-6 text-gray-200">Matching Movies</h2>
            <div id="movie-results-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                </div>

                <span id="page-info-display" class="page-info">Page 1 of 1</span>

        </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script>
        // App State Machine:
        //
        //   IDLE ──[Find Movies]──► LOADING ──[success]──► RESULTS
        //     ▲                       │                       │
        //     │                    [error]               [pagination]
        //     │                       │                       │
        //     │                       ▼                       ▼
        //     │                     ERROR              LOADING (next page)
        //     │                       │                       │
        //     └───[Clear]─────────────┴───────────────────────┘
        //
        //   On page load: check URL hash → if params, go to LOADING
        //                 else check localStorage → restore chips → IDLE

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        const App = (() => {
            // --- TMDb API Configuration ---
            const TMDB_API_KEY = "27c3e73a11410e90f680e8f28bf9a77d";
            const TMDB_BASE_URL = "https://api.themoviedb.org/3";
            const TMDB_IMAGE_BASE_URL = "https://image.tmdb.org/t/p/w500";
            // Region is now stored in state.region (default 'US')

            // =============================================================
            // App.state — current filters, page, cache
            // =============================================================
            const state = {
                genres: [],
                currentFetchedMovies: [],
                currentPage: 1,
                totalPages: 1,
                isInitialSearch: true,
                // In-memory cache: Map keyed by movie ID → enriched movie data
                movieCache: new Map(),
                // Streaming provider state
                selectedProviders: new Set(),
                availableProviders: [],
                region: 'US',

                clearFilters() {
                    state.currentFetchedMovies = [];
                    state.currentPage = 1;
                    state.totalPages = 1;
                    state.isInitialSearch = true;
                    state.movieCache.clear();
                    state.selectedProviders.clear();
                    ui.resetFilters();
                },
            };

            // =============================================================
            // App.storage — localStorage + URL hash (stubs for now)
            // =============================================================
            const storage = {
                // Slug maps — built after providers/genres are fetched
                _providerSlugToId: {},
                _providerIdToSlug: {},
                _genreSlugToId: {},
                _genreIdToSlug: {},

                buildSlugMaps() {
                    storage._providerSlugToId = {};
                    storage._providerIdToSlug = {};
                    state.availableProviders.forEach(p => {
                        const slug = p.provider_name.toLowerCase().replace(/\s+/g, '-');
                        storage._providerSlugToId[slug] = p.provider_id;
                        storage._providerIdToSlug[p.provider_id] = slug;
                    });
                    storage._genreSlugToId = {};
                    storage._genreIdToSlug = {};
                    state.genres.forEach(g => {
                        const slug = g.name.toLowerCase().replace(/\s+/g, '-');
                        storage._genreSlugToId[slug] = g.id;
                        storage._genreIdToSlug[g.id] = slug;
                    });
                },

                /** Encode current filters into URL hash: #timeMode/services/genre/rating */
                saveToHash() {
                    storage.buildSlugMaps();
                    // Segment 1: time mode
                    let timeSeg = '_';
                    if (ui._activeTimeMode === 'custom') {
                        timeSeg = `custom-${ui.elements.runtimeSlider.value}`;
                    } else if (ui._activeTimeMode && ui._activeTimeMode !== 'none') {
                        timeSeg = ui._activeTimeMode;
                    }

                    // Segment 2: selected services
                    let servicesSeg = '_';
                    if (state.selectedProviders.size > 0) {
                        const slugs = Array.from(state.selectedProviders)
                            .map(id => storage._providerIdToSlug[id])
                            .filter(Boolean);
                        if (slugs.length > 0) servicesSeg = slugs.join('+');
                    }

                    // Segment 3: genre
                    let genreSeg = '_';
                    const genreVal = ui.elements.genreSelect.value;
                    if (genreVal) {
                        const genreId = parseInt(genreVal, 10);
                        if (!isNaN(genreId) && storage._genreIdToSlug[genreId]) {
                            genreSeg = storage._genreIdToSlug[genreId];
                        }
                    }

                    // Segment 4: min rating
                    let ratingSeg = '_';
                    const ratingVal = ui.elements.minRatingInput.value;
                    if (ratingVal) {
                        const num = parseFloat(ratingVal);
                        if (!isNaN(num)) ratingSeg = `${num}+`;
                    }

                    const hash = `#${timeSeg}/${servicesSeg}/${genreSeg}/${ratingSeg}`;
                    history.replaceState(null, '', hash);
                },

                /**
                 * Parse URL hash and populate filters.
                 * Returns true if a valid hash was found and filters were set.
                 */
                loadFromHash() {
                    const hash = location.hash;
                    if (!hash || hash.length < 2) return false;

                    storage.buildSlugMaps();
                    const raw = hash.substring(1); // strip '#'
                    const segments = raw.split('/');

                    let hasAnything = false;

                    // Segment 1: time mode
                    const timeSeg = segments[0] || '_';
                    if (timeSeg !== '_') {
                        if (timeSeg === 'quick' || timeSeg === 'standard' || timeSeg === 'epic') {
                            ui.selectTimeSlot(timeSeg);
                            hasAnything = true;
                        } else if (timeSeg.startsWith('custom-')) {
                            const val = parseInt(timeSeg.substring(7), 10);
                            if (!isNaN(val) && val >= 30 && val <= 240) {
                                ui.elements.runtimeSlider.value = val;
                                ui.elements.runtimeSlider.setAttribute('aria-valuenow', val);
                                ui.activateSlider();
                                hasAnything = true;
                            }
                        }
                    }

                    // Segment 2: services
                    const servicesSeg = segments[1] || '_';
                    if (servicesSeg !== '_') {
                        const slugs = servicesSeg.split('+');
                        slugs.forEach(slug => {
                            const id = storage._providerSlugToId[slug];
                            if (id !== undefined) {
                                state.selectedProviders.add(id);
                                hasAnything = true;
                            }
                        });
                        // Update chip visuals
                        ui.renderProviderChips(state.availableProviders);
                    }

                    // Segment 3: genre
                    const genreSeg = segments[2] || '_';
                    if (genreSeg !== '_') {
                        const genreId = storage._genreSlugToId[genreSeg];
                        if (genreId !== undefined) {
                            ui.elements.genreSelect.value = String(genreId);
                            hasAnything = true;
                        }
                    }

                    // Segment 4: rating
                    const ratingSeg = segments[3] || '_';
                    if (ratingSeg !== '_' && ratingSeg.endsWith('+')) {
                        const num = parseFloat(ratingSeg.slice(0, -1));
                        if (!isNaN(num) && num >= 0 && num <= 10) {
                            ui.elements.minRatingInput.value = num;
                            hasAnything = true;
                        }
                    }

                    return hasAnything;
                },

                saveToLocalStorage() {
                    try {
                        const providerIds = Array.from(state.selectedProviders);
                        localStorage.setItem('moviefinder_services', JSON.stringify(providerIds));
                        localStorage.setItem('moviefinder_region', state.region);
                    } catch (e) {
                        // Safari private browsing or quota exceeded
                    }
                },

                loadFromLocalStorage() {
                    try {
                        const regionVal = localStorage.getItem('moviefinder_region');
                        if (regionVal) {
                            state.region = regionVal;
                            ui.elements.regionSelect.value = regionVal;
                        }
                        const servicesJson = localStorage.getItem('moviefinder_services');
                        if (servicesJson) {
                            const ids = JSON.parse(servicesJson);
                            if (Array.isArray(ids)) {
                                ids.forEach(id => {
                                    const num = parseInt(id, 10);
                                    if (!isNaN(num)) state.selectedProviders.add(num);
                                });
                            }
                        }
                    } catch (e) {
                        // Safari private browsing or corrupt data
                    }
                },

                showToast(message) {
                    const toast = document.getElementById('toast');
                    toast.textContent = message;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3000);
                },

                copyShareLink() {
                    storage.saveToHash();
                    const url = location.href;
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(url).then(() => {
                            storage.showToast('Link copied!');
                        }).catch(() => {
                            storage._fallbackCopy(url);
                        });
                    } else {
                        storage._fallbackCopy(url);
                    }
                },

                _fallbackCopy(text) {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        storage.showToast('Link copied!');
                    } catch (e) {
                        storage.showToast('Could not copy link');
                    }
                    document.body.removeChild(textarea);
                },
            };

            // =============================================================
            // App.ui — rendering, DOM manipulation
            // =============================================================
            const ui = {
                // --- DOM element references (populated on init) ---
                elements: {},

                init() {
                    ui.elements = {
                        timeSlotGroup: document.getElementById('time-slot-group'),
                        timeSlotBtns: document.querySelectorAll('.time-slot-btn'),
                        runtimeSlider: document.getElementById('runtime-slider'),
                        runtimeSliderLabel: document.getElementById('runtime-slider-label'),
                        genreSelect: document.getElementById('genre'),
                        minRatingInput: document.getElementById('min-rating'),
                        sortBySelect: document.getElementById('sort-by'),
                        findMoviesBtn: document.getElementById('find-movies-btn'),
                        clearFiltersBtn: document.getElementById('clear-filters-btn'),
                        shareBtn: document.getElementById('share-btn'),
                        movieResultsGrid: document.getElementById('movie-results-grid'),
                        noResultsMessage: document.getElementById('no-results-message'),
                        errorMessage: document.getElementById('error-message'),
                        paginationControls: document.getElementById('pagination-controls'),
                        prevPageBtn: document.getElementById('prev-page-btn'),
                        nextPageBtn: document.getElementById('next-page-btn'),
                        pageInfoDisplay: document.getElementById('page-info-display'),
                        regionSelect: document.getElementById('region-select'),
                        streamingChipsContainer: document.getElementById('streaming-chips-container'),
                        providerCountBadge: document.getElementById('provider-count-badge'),
                    };
                    // Track which time mode is active: 'none', 'quick', 'standard', 'epic', 'custom'
                    ui._activeTimeMode = 'none';
                },

                showLoading(isLoading) {
                    const { findMoviesBtn, prevPageBtn, nextPageBtn, movieResultsGrid, paginationControls, noResultsMessage } = ui.elements;
                    findMoviesBtn.disabled = isLoading;
                    prevPageBtn.disabled = isLoading;
                    nextPageBtn.disabled = isLoading;
                    findMoviesBtn.textContent = isLoading ? 'Searching...' : 'Find Movies';
                    if (isLoading) {
                        noResultsMessage.classList.add('hidden');
                        paginationControls.classList.add('hidden');
                        ui.showSkeletonCards();
                    }
                    // Skeleton cards are inside movieResultsGrid; displayMovies() will replace them
                },

                showSkeletonCards() {
                    const { movieResultsGrid } = ui.elements;
                    movieResultsGrid.innerHTML = '';
                    for (let i = 0; i < 10; i++) {
                        const card = document.createElement('div');
                        card.className = 'skeleton-card';
                        card.innerHTML = `
                            <div class="skeleton-block w-full" style="height: 288px;"></div>
                            <div class="p-5 flex flex-col gap-3" style="flex-grow:1;">
                                <div class="skeleton-block" style="height: 24px; width: 75%;"></div>
                                <div class="skeleton-block" style="height: 14px; width: 50%;"></div>
                                <div class="skeleton-block" style="height: 14px; width: 40%;"></div>
                                <div class="skeleton-block" style="height: 60px; width: 100%;"></div>
                                <div class="skeleton-block" style="height: 14px; width: 60%;"></div>
                            </div>
                        `;
                        movieResultsGrid.appendChild(card);
                    }
                },

                showError(message) {
                    const { errorMessage, movieResultsGrid, noResultsMessage, paginationControls } = ui.elements;
                    errorMessage.textContent = message;
                    errorMessage.classList.remove('hidden');
                    movieResultsGrid.innerHTML = '';
                    noResultsMessage.classList.add('hidden');
                    paginationControls.classList.add('hidden');
                },

                clearError() {
                    const { errorMessage } = ui.elements;
                    errorMessage.classList.add('hidden');
                    errorMessage.textContent = '';
                },

                populateGenreFilter(genres) {
                    const { genreSelect } = ui.elements;
                    genreSelect.innerHTML = '<option value="">Any Genre</option>';
                    genres.forEach(genre => {
                        const option = document.createElement('option');
                        option.value = genre.id;
                        option.textContent = genre.name;
                        genreSelect.appendChild(option);
                    });
                },

                renderMovieCard(movieWithDetails) {
                    const card = document.createElement('div');
                    card.className = 'movie-card rounded-lg shadow-lg overflow-hidden flex flex-col';

                    const posterPath = movieWithDetails.poster_path ? `${TMDB_IMAGE_BASE_URL}${movieWithDetails.poster_path}` : "https://placehold.co/300x450/4B5563/FFFFFF?text=No+Poster";
                    const releaseYear = movieWithDetails.release_date ? movieWithDetails.release_date.substring(0, 4) : "N/A";
                    const rating = movieWithDetails.vote_average ? movieWithDetails.vote_average.toFixed(1) : "N/A";
                    const runtimeDisplay = movieWithDetails.runtime ? `${movieWithDetails.runtime} min` : "N/A";

                    // Prepare streaming provider information
                    const safeTitle = escapeHtml(movieWithDetails.title);
                    const safeOverview = escapeHtml(movieWithDetails.overview) || "No overview available.";

                    let streamingHtml = `<p class="text-xs text-gray-500 mt-2">Streaming info not available for ${escapeHtml(state.region)}.</p>`;
                    if (movieWithDetails.watchProviders) {
                        const providers = movieWithDetails.watchProviders;
                        const streamLink = escapeHtml(providers.link || `https://www.themoviedb.org/movie/${movieWithDetails.id}/watch`);

                        if (providers.flatrate && providers.flatrate.length > 0) {
                            streamingHtml = `<div class="mt-2 text-xs streaming-info">`;
                            streamingHtml += `<p class="text-gray-400 mb-1">Stream on (${escapeHtml(state.region)}):</p>`;
                            providers.flatrate.slice(0, 3).forEach(p => {
                                const safeName = escapeHtml(p.provider_name);
                                streamingHtml += `<span class="inline-flex items-center mr-2 mb-1">`;
                                if (p.logo_path) {
                                    streamingHtml += `<img src="${TMDB_IMAGE_BASE_URL}${p.logo_path}" alt="${safeName}" class="streaming-provider-logo">`;
                                }
                                streamingHtml += `<span class="text-gray-300">${safeName}</span></span>`;
                            });
                            if (providers.flatrate.length > 3) {
                                streamingHtml += `<span class="text-gray-400">& more</span>`;
                            }
                            streamingHtml += `<p class="mt-1"><a href="${streamLink}" target="_blank" rel="noopener noreferrer">See all options on TMDb</a></p>`;
                            streamingHtml += `</div>`;
                        } else {
                            streamingHtml = `<p class="text-xs text-gray-500 mt-2">Not currently on major streaming services in ${escapeHtml(state.region)}. <a href="${streamLink}" target="_blank" rel="noopener noreferrer">Check TMDb for options.</a></p>`;
                        }
                    }

                    card.innerHTML = `
                        <img src="${posterPath}" alt="${safeTitle} Poster" class="w-full h-72 object-cover" onerror="this.onerror=null;this.src='https://placehold.co/300x450/4B5563/FFFFFF?text=Image+Error';">
                        <div class="p-5 flex flex-col flex-grow">
                            <h3 class="text-xl font-semibold mb-2 text-white">${safeTitle || 'Title N/A'} (${escapeHtml(releaseYear)})</h3>
                            <p class="text-sm text-gray-400 mb-1"><span class="font-medium text-gray-300">Rating:</span> ${escapeHtml(rating)}/10 (${movieWithDetails.vote_count || 0} votes)</p>
                            <p class="text-sm text-gray-400 mb-1"><span class="font-medium text-gray-300">Runtime:</span> ${escapeHtml(runtimeDisplay)}</p>
                            <p class="text-xs text-gray-500 flex-grow leading-relaxed mb-2">${safeOverview}</p>
                            ${streamingHtml} </div>
                    `;
                    // Track outbound link clicks on the card
                    card.querySelectorAll('a[target="_blank"]').forEach(link => {
                        link.addEventListener('click', () => {
                            analytics.trackCardClick(movieWithDetails.title);
                        });
                    });
                    return card;
                },

                buildContextualEmptyMessage() {
                    const runtimeParams = ui.getRuntimeParams();
                    const { genreSelect, minRatingInput } = ui.elements;
                    const selectedGenreId = genreSelect.value;
                    const minRating = parseFloat(minRatingInput.value) || 0;
                    const numServices = state.selectedProviders.size;

                    const parts = [];
                    const suggestions = [];

                    // Describe active filters
                    if (ui._activeTimeMode !== 'none') {
                        if (ui._activeTimeMode === 'quick') parts.push('under 90 minutes');
                        else if (ui._activeTimeMode === 'standard') parts.push('90–120 minutes');
                        else if (ui._activeTimeMode === 'epic') parts.push('over 2 hours');
                        else if (ui._activeTimeMode === 'custom' && runtimeParams.lte) parts.push(`under ${runtimeParams.lte} minutes`);
                    }
                    if (numServices > 0) {
                        const serviceNames = Array.from(state.selectedProviders)
                            .map(id => {
                                const p = state.availableProviders.find(p => p.provider_id === id);
                                return p ? p.provider_name : null;
                            })
                            .filter(Boolean);
                        if (serviceNames.length === 1) parts.push(`on ${serviceNames[0]}`);
                        else if (serviceNames.length === 2) parts.push(`on ${serviceNames.join(' or ')}`);
                        else parts.push(`on ${serviceNames.slice(0, 2).join(', ')} or others`);
                    }
                    if (selectedGenreId) {
                        const genre = state.genres.find(g => String(g.id) === selectedGenreId);
                        if (genre) parts.push(`in ${genre.name}`);
                    }
                    if (minRating > 0) parts.push(`rated ${minRating}+`);

                    const filterDesc = parts.length > 0 ? ` matching: ${parts.join(', ')}` : '';
                    let message = `No movies found${filterDesc}.`;

                    // Build suggestions
                    if (runtimeParams.lte && runtimeParams.lte < 60) {
                        suggestions.push(`Try increasing your time to 90 minutes`);
                    } else if (runtimeParams.lte && runtimeParams.lte < 90) {
                        suggestions.push(`Try bumping your time up to 90 or 120 minutes`);
                    }
                    if (numServices === 1) {
                        suggestions.push(`add more streaming services`);
                    } else if (numServices > 1 && numServices < 4) {
                        suggestions.push(`select additional streaming services`);
                    }
                    if (minRating > 8) {
                        suggestions.push(`lower your minimum rating to 7 or 8`);
                    }
                    if (selectedGenreId) {
                        suggestions.push(`try a different genre`);
                    }
                    if (suggestions.length === 0) {
                        suggestions.push(`try adjusting your filters`);
                    }

                    message += ` ${suggestions.map((s, i) => i === 0 ? s.charAt(0).toUpperCase() + s.slice(1) : s).join(', or ')}.`;
                    return message;
                },

                displayMovies(moviesToDisplay) {
                    const { movieResultsGrid, noResultsMessage, paginationControls } = ui.elements;
                    movieResultsGrid.innerHTML = '';
                    if (!moviesToDisplay || moviesToDisplay.length === 0) {
                        if (!state.isInitialSearch) {
                            noResultsMessage.textContent = ui.buildContextualEmptyMessage();
                            noResultsMessage.classList.remove('hidden');
                        }
                        paginationControls.classList.add('hidden');
                    } else {
                        noResultsMessage.classList.add('hidden');
                        moviesToDisplay.forEach(movie => {
                            const movieCard = ui.renderMovieCard(movie);
                            movieResultsGrid.appendChild(movieCard);
                        });
                        ui.updatePaginationControls();
                        paginationControls.classList.remove('hidden');
                    }
                    state.isInitialSearch = false;
                },

                updatePaginationControls() {
                    const { pageInfoDisplay, prevPageBtn, nextPageBtn, paginationControls } = ui.elements;
                    pageInfoDisplay.textContent = `Page ${state.currentPage} of ${state.totalPages}`;
                    prevPageBtn.disabled = state.currentPage === 1;
                    nextPageBtn.disabled = state.currentPage >= state.totalPages;

                    if (state.totalPages <= 1) {
                        paginationControls.classList.add('hidden');
                    } else {
                        paginationControls.classList.remove('hidden');
                    }
                },

                renderProviderSkeletons() {
                    const container = document.getElementById('streaming-chips-container');
                    container.innerHTML = '';
                    for (let i = 0; i < 10; i++) {
                        const pill = document.createElement('span');
                        pill.className = 'skeleton-pill';
                        container.appendChild(pill);
                    }
                },

                renderProviderChips(providers) {
                    const container = document.getElementById('streaming-chips-container');
                    container.innerHTML = '';
                    if (!providers || providers.length === 0) {
                        container.innerHTML = '<span class="text-gray-500 text-sm italic">No providers available for this region.</span>';
                        return;
                    }
                    providers.forEach(provider => {
                        const chip = document.createElement('button');
                        chip.type = 'button';
                        chip.className = 'provider-chip';
                        chip.dataset.providerId = provider.provider_id;
                        const logoUrl = provider.logo_path ? `https://image.tmdb.org/t/p/w92${provider.logo_path}` : '';
                        chip.innerHTML = `${logoUrl ? `<img src="${logoUrl}" alt="" loading="lazy">` : ''}<span>${escapeHtml(provider.provider_name)}</span>`;
                        const isSelected = state.selectedProviders.has(provider.provider_id);
                        if (isSelected) {
                            chip.classList.add('selected');
                        }
                        chip.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
                        chip.addEventListener('click', () => {
                            const id = provider.provider_id;
                            if (state.selectedProviders.has(id)) {
                                state.selectedProviders.delete(id);
                                chip.classList.remove('selected');
                                chip.setAttribute('aria-pressed', 'false');
                            } else {
                                state.selectedProviders.add(id);
                                chip.classList.add('selected');
                                chip.setAttribute('aria-pressed', 'true');
                            }
                            ui.updateProviderCountBadge();
                            storage.saveToLocalStorage();
                        });
                        container.appendChild(chip);
                    });
                    ui.updateProviderCountBadge();
                },

                renderProviderError() {
                    const container = document.getElementById('streaming-chips-container');
                    container.innerHTML = `<span class="text-red-400 text-sm">Couldn't load services. <a href="#" id="retry-providers-link" class="underline text-blue-400 hover:text-blue-300">Retry</a></span>`;
                    document.getElementById('retry-providers-link').addEventListener('click', (e) => {
                        e.preventDefault();
                        apiModule.fetchProviders(state.region);
                    });
                },

                updateProviderCountBadge() {
                    const badge = document.getElementById('provider-count-badge');
                    if (!badge) return;
                    const total = state.availableProviders.length;
                    const selected = state.selectedProviders.size;
                    if (selected > 0) {
                        badge.textContent = `${selected} of ${total} selected`;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                },

                deselectAllProviderChips() {
                    const chips = document.querySelectorAll('.provider-chip');
                    chips.forEach(chip => {
                        chip.classList.remove('selected');
                        chip.setAttribute('aria-pressed', 'false');
                    });
                    ui.updateProviderCountBadge();
                },

                resetFilters() {
                    const { genreSelect, minRatingInput, sortBySelect, movieResultsGrid, noResultsMessage, paginationControls, runtimeSlider, runtimeSliderLabel, timeSlotBtns } = ui.elements;
                    // Clear time slot selection
                    timeSlotBtns.forEach(btn => {
                        btn.classList.remove('active');
                        btn.setAttribute('aria-checked', 'false');
                    });
                    ui._activeTimeMode = 'none';
                    // Reset slider to default
                    runtimeSlider.value = 120;
                    runtimeSliderLabel.textContent = '120 min';
                    runtimeSlider.classList.remove('slider-active');
                    runtimeSlider.classList.add('slider-inactive');
                    // Clear other filters
                    genreSelect.value = '';
                    minRatingInput.value = '';
                    sortBySelect.value = 'popularity.desc';
                    // Deselect provider chips (but keep available list)
                    ui.deselectAllProviderChips();
                    ui.clearError();
                    movieResultsGrid.innerHTML = '';
                    noResultsMessage.classList.add('hidden');
                    paginationControls.classList.add('hidden');
                },

                setControlsDisabled(disabled) {
                    const { genreSelect, minRatingInput, sortBySelect, findMoviesBtn, clearFiltersBtn, runtimeSlider, timeSlotBtns, regionSelect } = ui.elements;
                    timeSlotBtns.forEach(btn => btn.disabled = disabled);
                    runtimeSlider.disabled = disabled;
                    genreSelect.disabled = disabled;
                    minRatingInput.disabled = disabled;
                    sortBySelect.disabled = disabled;
                    findMoviesBtn.disabled = disabled;
                    clearFiltersBtn.disabled = disabled;
                    if (regionSelect) regionSelect.disabled = disabled;
                },

                /** Select a time slot preset, deselecting slider custom mode */
                selectTimeSlot(slot) {
                    const { timeSlotBtns, runtimeSlider } = ui.elements;
                    timeSlotBtns.forEach(btn => {
                        const isActive = btn.dataset.slot === slot;
                        btn.classList.toggle('active', isActive);
                        btn.setAttribute('aria-checked', isActive ? 'true' : 'false');
                    });
                    ui._activeTimeMode = slot;
                    runtimeSlider.classList.remove('slider-active');
                    runtimeSlider.classList.add('slider-inactive');
                },

                /** Activate slider custom mode, deselecting preset buttons */
                activateSlider() {
                    const { timeSlotBtns, runtimeSlider, runtimeSliderLabel } = ui.elements;
                    timeSlotBtns.forEach(btn => { btn.classList.remove('active'); btn.setAttribute('aria-checked', 'false'); });
                    ui._activeTimeMode = 'custom';
                    runtimeSlider.classList.add('slider-active');
                    runtimeSlider.classList.remove('slider-inactive');
                    runtimeSliderLabel.textContent = `${runtimeSlider.value} min`;
                },

                /** Get runtime filter params based on current time mode */
                getRuntimeParams() {
                    const { runtimeSlider } = ui.elements;
                    switch (ui._activeTimeMode) {
                        case 'quick':
                            return { lte: 90 };
                        case 'standard':
                            return { gte: 90, lte: 120 };
                        case 'epic':
                            return { gte: 120 };
                        case 'custom':
                            return { lte: parseInt(runtimeSlider.value, 10) };
                        default:
                            return {};
                    }
                },
            };

            // =============================================================
            // App.api — all TMDb calls
            // =============================================================
            const apiModule = {
                async fetchGenres() {
                    if (!TMDB_API_KEY || TMDB_API_KEY === "YOUR_TMDB_API_KEY") {
                        ui.showError("API Key is missing or invalid. Please check the script.");
                        ui.setControlsDisabled(true);
                        return false;
                    }
                    ui.setControlsDisabled(false);

                    const { findMoviesBtn } = ui.elements;
                    const originalButtonText = findMoviesBtn.textContent;
                    const isButtonDisabled = findMoviesBtn.disabled;
                    if (!isButtonDisabled) {
                        findMoviesBtn.disabled = true;
                        findMoviesBtn.textContent = 'Loading Genres...';
                    }
                    ui.clearError();
                    try {
                        const response = await fetch(`${TMDB_BASE_URL}/genre/movie/list?api_key=${TMDB_API_KEY}&language=en-US`);
                        if (!response.ok) throw new Error(`API Error: ${response.status} ${response.statusText}`);
                        const data = await response.json();
                        state.genres = data.genres || [];
                        ui.populateGenreFilter(state.genres);
                        return true;
                    } catch (error) {
                        console.error("Failed to fetch genres:", error);
                        ui.showError(`Failed to load genres: ${error.message}.`);
                        return false;
                    } finally {
                        if (!isButtonDisabled) {
                            findMoviesBtn.disabled = false;
                            findMoviesBtn.textContent = originalButtonText;
                        }
                    }
                },

                async fetchProviders(region) {
                    region = region || state.region;
                    ui.renderProviderSkeletons();
                    try {
                        const response = await fetch(`${TMDB_BASE_URL}/watch/providers/movie?api_key=${TMDB_API_KEY}&watch_region=${region}`);
                        if (!response.ok) throw new Error(`API Error: ${response.status}`);
                        const data = await response.json();
                        const sorted = (data.results || []).sort((a, b) => a.display_priority - b.display_priority).slice(0, 10);
                        state.availableProviders = sorted;
                        state.region = region;
                        ui.renderProviderChips(sorted);
                        return true;
                    } catch (error) {
                        console.error('Failed to fetch providers:', error);
                        state.availableProviders = [];
                        ui.renderProviderError();
                        return false;
                    }
                },

                // Optimized: uses append_to_response to get runtime + watch providers in a single call
                async fetchMovieDetails(movie) {
                    // Check in-memory cache first
                    if (state.movieCache.has(movie.id)) {
                        return state.movieCache.get(movie.id);
                    }

                    let enrichedMovie = { ...movie, runtime: null, watchProviders: null };
                    try {
                        // Single API call with append_to_response for runtime AND watch providers
                        const response = await fetch(
                            `${TMDB_BASE_URL}/movie/${movie.id}?api_key=${TMDB_API_KEY}&language=en-US&append_to_response=watch/providers`
                        );
                        if (response.ok) {
                            const data = await response.json();
                            enrichedMovie.runtime = data.runtime || null;

                            // Watch providers are nested under "watch/providers"
                            const wpData = data['watch/providers'];
                            if (wpData && wpData.results && wpData.results[state.region]) {
                                enrichedMovie.watchProviders = wpData.results[state.region];
                            }

                            // Cache only on success
                            state.movieCache.set(movie.id, enrichedMovie);
                        } else {
                            console.warn(`Could not fetch details for movie ID ${movie.id}: ${response.statusText}`);
                        }

                        return enrichedMovie;
                    } catch (error) {
                        console.warn(`Error fetching details/providers for movie ID ${movie.id}:`, error);
                        return enrichedMovie;
                    }
                },

                sortByRuntime(movies, sortByValue) {
                    const [sortField, sortDirection] = sortByValue.split('.');
                    if (sortField === 'runtime') {
                        return [...movies].sort((a, b) => {
                            const runtimeA = a.runtime === null || typeof a.runtime === 'undefined' ? (sortDirection === 'asc' ? Infinity : -Infinity) : a.runtime;
                            const runtimeB = b.runtime === null || typeof b.runtime === 'undefined' ? (sortDirection === 'asc' ? Infinity : -Infinity) : b.runtime;

                            if (runtimeA < runtimeB) return sortDirection === 'asc' ? -1 : 1;
                            if (runtimeA > runtimeB) return sortDirection === 'asc' ? 1 : -1;
                            return 0;
                        });
                    }
                    return movies;
                },

                async discoverMovies(page = 1) {
                    if (!TMDB_API_KEY || TMDB_API_KEY === "YOUR_TMDB_API_KEY") {
                        ui.showError("API Key is missing or invalid. Please configure it in the script.");
                        return;
                    }

                    ui.showLoading(true);
                    ui.clearError();
                    state.currentPage = page;

                    const { genreSelect, minRatingInput, sortBySelect } = ui.elements;
                    const runtimeParams = ui.getRuntimeParams();
                    const selectedGenreId = genreSelect.value;
                    const minRatingVal = minRatingInput.value;
                    const sortByValue = sortBySelect.value;

                    let apiUrl = `${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&language=en-US&include_adult=false&include_video=false&page=${state.currentPage}`;

                    if (runtimeParams.lte) apiUrl += `&with_runtime.lte=${runtimeParams.lte}`;
                    if (runtimeParams.gte) apiUrl += `&with_runtime.gte=${runtimeParams.gte}`;
                    if (selectedGenreId) apiUrl += `&with_genres=${selectedGenreId}`;
                    if (minRatingVal) apiUrl += `&vote_average.gte=${minRatingVal}`;
                    apiUrl += `&vote_count.gte=100`;

                    // Add streaming provider filter if any selected
                    if (state.selectedProviders.size > 0) {
                        const providerIds = Array.from(state.selectedProviders).join('|');
                        apiUrl += `&with_watch_providers=${providerIds}&watch_region=${state.region}`;
                    }

                    if (!sortByValue.startsWith('runtime.')) {
                        apiUrl += `&sort_by=${sortByValue}`;
                    } else {
                        apiUrl += `&sort_by=popularity.desc`;
                    }

                    try {
                        const response = await fetch(apiUrl);
                        if (!response.ok) {
                            let errorMessage = 'Unknown TMDb error';
                            try {
                                const errorData = await response.json();
                                errorMessage = errorData.status_message || errorMessage;
                            } catch (e) {
                                // response body was not valid JSON
                            }
                            throw new Error(`API Error: ${response.status} ${response.statusText} - ${errorMessage}`);
                        }
                        const data = await response.json();
                        state.totalPages = data.total_pages || 1;
                        let baseMovies = data.results || [];

                        if (baseMovies.length === 0) {
                            state.currentFetchedMovies = [];
                            ui.displayMovies([]);
                            ui.updatePaginationControls();
                            return;
                        }

                        const detailPromises = baseMovies.map(movie => apiModule.fetchMovieDetails(movie));
                        state.currentFetchedMovies = await Promise.all(detailPromises);

                        if (sortByValue.startsWith('runtime.')) {
                            state.currentFetchedMovies = apiModule.sortByRuntime(state.currentFetchedMovies, sortByValue);
                        }

                        ui.displayMovies(state.currentFetchedMovies);
                        storage.saveToHash();
                        document.getElementById('movie-results-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

                    } catch (error) {
                        console.error("Failed to fetch or process movies:", error);
                        ui.showError(`Operation failed: ${error.message}. Check console for details.`);
                        state.currentFetchedMovies = [];
                        ui.displayMovies([]);
                    } finally {
                        ui.showLoading(false);
                    }
                },
            };

            // =============================================================
            // App.analytics — GoatCounter event tracking
            // =============================================================
            const analytics = {
                track(eventName, path) {
                    if (window.goatcounter && window.goatcounter.count) {
                        window.goatcounter.count({ path: eventName, title: path || eventName, event: true });
                    }
                },

                trackSearch() {
                    const filterTypes = [];
                    if (ui._activeTimeMode !== 'none') filterTypes.push('time');
                    if (state.selectedProviders.size > 0) filterTypes.push('streaming');
                    const { genreSelect, minRatingInput } = ui.elements;
                    if (genreSelect.value) filterTypes.push('genre');
                    if (minRatingInput.value) filterTypes.push('rating');
                    const label = filterTypes.length > 0 ? `search:${filterTypes.sort().join('+')}` : 'search:no-filters';
                    analytics.track(label);
                },

                trackShare() {
                    analytics.track('share:button-click');
                },

                trackCardClick(movieTitle) {
                    analytics.track('card:outbound-click');
                },
            };

            // =============================================================
            // App.init — wire up event listeners and kick off
            // =============================================================
            async function init() {
                ui.init();

                const { findMoviesBtn, clearFiltersBtn, prevPageBtn, nextPageBtn, paginationControls, timeSlotBtns, runtimeSlider, runtimeSliderLabel } = ui.elements;

                // Time slot preset buttons — click to select/deselect
                timeSlotBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const slot = btn.dataset.slot;
                        // Toggle: if already active, deselect
                        if (ui._activeTimeMode === slot) {
                            btn.classList.remove('active');
                            btn.setAttribute('aria-checked', 'false');
                            ui._activeTimeMode = 'none';
                            runtimeSlider.classList.remove('slider-active');
                            runtimeSlider.classList.add('slider-inactive');
                        } else {
                            ui.selectTimeSlot(slot);
                        }
                    });
                });

                // Arrow key navigation within the time slot radiogroup
                ui.elements.timeSlotGroup.addEventListener('keydown', (e) => {
                    const btns = Array.from(ui.elements.timeSlotBtns);
                    const focused = document.activeElement;
                    const idx = btns.indexOf(focused);
                    if (idx === -1) return;
                    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        const next = btns[(idx + 1) % btns.length];
                        next.focus();
                        ui.selectTimeSlot(next.dataset.slot);
                    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                        e.preventDefault();
                        const prev = btns[(idx - 1 + btns.length) % btns.length];
                        prev.focus();
                        ui.selectTimeSlot(prev.dataset.slot);
                    }
                });

                // Runtime slider — activates custom mode on interaction
                runtimeSlider.addEventListener('input', () => {
                    ui.activateSlider();
                    runtimeSlider.setAttribute('aria-valuenow', runtimeSlider.value);
                });

                // Start slider in inactive state
                runtimeSlider.classList.add('slider-inactive');

                findMoviesBtn.addEventListener('click', () => {
                    state.isInitialSearch = false;
                    analytics.trackSearch();
                    apiModule.discoverMovies(1);
                });

                clearFiltersBtn.addEventListener('click', () => {
                    state.clearFilters();
                });

                prevPageBtn.addEventListener('click', () => {
                    if (state.currentPage > 1) {
                        apiModule.discoverMovies(state.currentPage - 1);
                    }
                });

                nextPageBtn.addEventListener('click', () => {
                    if (state.currentPage < state.totalPages) {
                        apiModule.discoverMovies(state.currentPage + 1);
                    }
                });

                paginationControls.classList.add('hidden');

                // Region dropdown change → re-fetch providers, clear selections
                const regionSelect = ui.elements.regionSelect;
                regionSelect.addEventListener('change', () => {
                    state.region = regionSelect.value;
                    state.selectedProviders.clear();
                    state.movieCache.clear(); // Watch providers may differ by region
                    storage.saveToLocalStorage();
                    apiModule.fetchProviders(state.region);
                });

                // Share button
                const shareBtn = ui.elements.shareBtn;
                shareBtn.addEventListener('click', () => {
                    analytics.trackShare();
                    storage.copyShareLink();
                });

                // Check if URL hash is present BEFORE fetching data
                const hasHash = location.hash && location.hash.length > 1;

                // If no hash, restore region from localStorage before fetching providers
                if (!hasHash) {
                    storage.loadFromLocalStorage();
                    // Region may have changed from localStorage
                    regionSelect.value = state.region;
                }

                await Promise.all([
                    apiModule.fetchGenres(),
                    apiModule.fetchProviders(state.region),
                ]);

                // After data is fetched, apply hash or localStorage selections
                if (hasHash) {
                    const loaded = storage.loadFromHash();
                    if (loaded) {
                        state.isInitialSearch = false;
                        apiModule.discoverMovies(1);
                    }
                } else {
                    // Re-render chips with localStorage provider selections applied
                    if (state.selectedProviders.size > 0) {
                        ui.renderProviderChips(state.availableProviders);
                    }
                }
            }

            // Public interface
            return {
                api: apiModule,
                ui,
                state,
                storage,
                analytics,
                init,
            };
        })();

        // --- Boot ---
        document.addEventListener('DOMContentLoaded', () => App.init());

    </script>
</body>
